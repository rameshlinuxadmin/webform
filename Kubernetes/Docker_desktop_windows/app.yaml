apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: my-fullstack-app
  namespace: argocd
spec:
  destination:
    namespace: default
    server: https://kubernetes.default.svc
  project: default
  source:
    repoURL: https://github.com/rameshlinuxadmin/webform.git
    targetRevision: main
    path: Kubernetes/Docker_desktop_windows
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
