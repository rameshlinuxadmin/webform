apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: votingapp
  namespace: argocd
spec:
  destination:
    namespace: votingapp
    server: https://kubernetes.default.svc
  project: default

  source:
    repoURL: https://github.com/rameshlinuxadmin/webform.git
    targetRevision: main
    path: helm_voting_app/voting-app        # IMPORTANT ← This must be your Helm chart folder
    helm:
      valueFiles:
        - values.yaml       # optional (default)

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
