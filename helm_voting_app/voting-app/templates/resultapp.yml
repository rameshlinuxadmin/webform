apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.resultApp.name }}-deploy
spec:
  replicas: 1
  selector:
    matchLabels:
      name: {{ .Values.resultApp.name }}-pod
      app: demo-voting-app
  template:
    metadata: 
      name: {{ .Values.resultApp.name }}
      labels:
        name: {{ .Values.resultApp.name }}-pod
        app: demo-voting-app
    spec: 
      containers:
        - name: {{ .Values.resultApp.name }}
          image: {{ .Values.resultApp.image }}
          ports:
            - containerPort: 80 

---
apiVersion: v1
kind: Service
metadata: 
  name: result-app-service
  labels:
    name: result-app-service
    app: demo-voting-app
spec: 
  type: NodePort
  selector: 
    name: result-app-pod
    app: demo-voting-app
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30001