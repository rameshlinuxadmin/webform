apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.votingApp.name }}-deploy
spec:
  replicas: 1
  selector:
    matchLabels:
      name: {{ .Values.votingApp.name }}-pod
      app: demo-voting-app
  template:
    metadata: 
      name: {{ .Values.votingApp.name }}
      labels:
        name: {{ .Values.votingApp.name }}-pod
        app: demo-voting-app
    spec: 
      containers:
        - name: {{ .Values.votingApp.name }}
          image: {{ .Values.votingApp.image }}
          ports:
            - containerPort: 80

---
apiVersion: v1
kind: Service
metadata: 
  name: voting-app-service
  labels:
    name: voting-app-service
    app: demo-voting-app
spec: 
  type: NodePort
  selector: 
    name: voting-app-pod
    app: demo-voting-app
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30000